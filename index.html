<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allah Rakha | Portfolio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui, Arial;
}

body{
background:#111;
color:white;
}

/* MAIN LAYOUT */
.container{
display:flex;
height:100vh;
}

/* LEFT IMAGE SIDE */
.left{
flex:1;
background:#000;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.left img{
width:90%;
height:90%;
object-fit:cover;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
}

/* RIGHT CONTENT */
.right{
flex:1;
display:flex;
align-items:center;
padding:60px;
background:#111;
}

.content h4{
color:#fbbf24;
letter-spacing:2px;
}

.content h1{
font-size:50px;
margin-top:10px;
}

.content h1 span{
color:#fbbf24;
}

.content h2{
font-size:28px;
margin-top:10px;
color:#e5e5e5;
}

.content p{
margin-top:15px;
color:#aaa;
max-width:500px;
line-height:1.6;
}

/* BUTTON */
.btn{
display:inline-block;
margin-top:25px;
padding:12px 25px;
background:#fbbf24;
color:black;
border-radius:30px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* RIGHT FLOAT MENU (like image) */
.menu{
position:fixed;
right:20px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:15px;
}

.menu div{
width:45px;
height:45px;
border-radius:50%;
background:#222;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.3s;
}

.menu div:hover{
background:#fbbf24;
color:black;
}
</style>

</head>

<body>

<div class="container">

<!-- LEFT IMAGE -->
<div class="left">
<img src="myphoto.jpg" alt="profile">
</div>

<!-- RIGHT CONTENT -->
<div class="right">
<div class="content">

<h4>— I'M ALLAH RAKHA</h4>
<h1>UNITY <span>DEVELOPER</span></h1>

<h2>Game Developer & C# Programmer</h2>

<p>
I build modern 2D & 3D Unity games with smooth gameplay, UI systems and interactive mechanics.
</p>

<a class="btn" href="#contact">HIRE ME</a>

</div>
</div>

</div>

<!-- SIDE MENU -->
<div class="menu">
<div>🏠</div>
<div>👤</div>
<div>💼</div>
<div>✉️</div>
</div>

</body>
</html>
